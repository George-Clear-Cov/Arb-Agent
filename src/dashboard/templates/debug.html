{% extends "base.html" %}
{% set active = "debug" %}
{% block title %}Feed Health — Arb Agent{% endblock %}

{% block content %}
<style>
  .debug-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .feed-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.4rem;
    position: relative;
    overflow: hidden;
  }
  .feed-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .feed-card.healthy::before  { background: var(--green); }
  .feed-card.degraded::before { background: var(--yellow, #f59e0b); }
  .feed-card.error::before    { background: var(--red); }
  .feed-card.unknown::before  { background: var(--border); }

  .feed-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .feed-status-badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-healthy  { background: rgba(62,207,142,0.15); color: var(--green); }
  .badge-degraded { background: rgba(245,158,11,0.15);  color: #f59e0b; }
  .badge-error    { background: rgba(239,68,68,0.15);   color: var(--red); }
  .badge-unknown  { background: rgba(0,0,0,.06); color: var(--text3); }

  .feed-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.3rem 1rem;
    margin-top: 0.7rem;
  }
  .stat-row { display: contents; }
  .stat-label { font-size: 0.72rem; color: var(--text3); }
  .stat-val   { font-size: 0.72rem; font-family: var(--font-num); color: var(--text2); text-align: right; }
  .stat-val.ok  { color: var(--green); }
  .stat-val.bad { color: var(--red); }

  .error-text {
    margin-top: 0.6rem;
    font-size: 0.68rem;
    color: var(--red);
    background: rgba(239,68,68,0.07);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    word-break: break-all;
    max-height: 60px;
    overflow: hidden;
  }

  /* Source breakdown table */
  .breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.4rem;
    margin-bottom: 2rem;
  }
  .breakdown h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    margin: 0 0 1rem;
  }
  .breakdown table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .breakdown th {
    text-align: left;
    color: var(--text3);
    font-weight: 500;
    padding: 0.3rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .breakdown td {
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-num);
    color: var(--text2);
  }
  .breakdown td:first-child { font-family: var(--font-ui); color: var(--text); }
  .breakdown tr:last-child td { border-bottom: none; }

  /* Sample markets */
  .samples-toggle {
    font-size: 0.7rem;
    color: var(--accent);
    cursor: pointer;
    margin-top: 0.8rem;
    display: block;
  }
  .samples-list {
    display: none;
    margin-top: 0.5rem;
  }
  .samples-list.open { display: block; }
  .sample-item {
    font-size: 0.68rem;
    color: var(--text3);
    padding: 0.2rem 0;
    border-bottom: 1px solid var(--border);
  }
  .sample-sport { color: var(--accent); margin-right: 0.4rem; }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    margin: 2rem 0 0.8rem;
  }

  #last-refresh {
    font-size: 0.72rem;
    color: var(--text3);
    margin-bottom: 1.5rem;
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 0.8rem;
    transition: border-color .15s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>

<h2 style="font-size:1.2rem;font-weight:600;margin-bottom:0.3rem;">Feed Health</h2>
<p id="last-refresh">Loading…
  <button class="refresh-btn" onclick="loadDebug()">↻ Refresh</button>
</p>

<p class="section-title">Live Status</p>
<div class="debug-grid" id="feed-cards"></div>

<p class="section-title">Market Counts by Source</p>
<div class="breakdown" id="breakdown-table">
  <p style="color:var(--text3);font-size:0.8rem;">Loading…</p>
</div>

<script>
async function loadDebug() {
  const data = await fetch('/api/debug').then(r => r.json()).catch(() => null);
  if (!data) return;

  document.getElementById('last-refresh').innerHTML =
    `Last refreshed: <strong>${new Date().toLocaleTimeString()}</strong> &nbsp;·&nbsp; Cycle #${data.cycle_count || '—'}
     <button class="refresh-btn" onclick="loadDebug()">↻ Refresh</button>`;

  // ── Feed health cards ──────────────────────────────────────────────────
  const cards = document.getElementById('feed-cards');
  const health = data.feed_health || [];

  if (!health.length) {
    cards.innerHTML = '<p style="color:var(--text3);font-size:0.8rem;">No feed data yet — waiting for first cycle to complete.</p>';
  } else {
    cards.innerHTML = health.map(f => {
      const state  = !f.last_success ? 'unknown'
                   : f.consecutive_errors >= 3 ? 'error'
                   : f.consecutive_errors > 0  ? 'degraded'
                   : 'healthy';
      const badge  = { healthy: 'badge-healthy', degraded: 'badge-degraded', error: 'badge-error', unknown: 'badge-unknown' }[state];
      const label  = state.charAt(0).toUpperCase() + state.slice(1);
      const ago    = f.seconds_since_success != null
                     ? _ago(f.seconds_since_success) : '—';

      const rows = [
        ['Last count',    f.last_count ?? '—',            f.last_count > 0 ? 'ok' : 'bad'],
        ['Peak count',    f.peak_count ?? '—',            ''],
        ['Last success',  ago,                             ''],
        ['Total fetches', f.total_fetches ?? '—',         ''],
        ['Errors total',  f.total_errors ?? '—',          f.total_errors > 0 ? 'bad' : 'ok'],
        ['Consec. errors',f.consecutive_errors ?? '—',    f.consecutive_errors > 0 ? 'bad' : 'ok'],
      ];

      const statsHtml = rows.map(([label, val, cls]) =>
        `<span class="stat-label">${label}</span><span class="stat-val ${cls}">${val}</span>`
      ).join('');

      const errorHtml = f.last_error
        ? `<div class="error-text">⚠ ${_esc(f.last_error)}</div>` : '';

      return `
        <div class="feed-card ${state}">
          <div class="feed-name">
            ${_esc(f.source)}
            <span class="feed-status-badge ${badge}">${label}</span>
          </div>
          <div class="feed-stats">${statsHtml}</div>
          ${errorHtml}
        </div>`;
    }).join('');
  }

  // ── Breakdown table ────────────────────────────────────────────────────
  const by = data.by_source || {};
  const sources = Object.keys(by);
  const brkDiv = document.getElementById('breakdown-table');
  if (!sources.length) {
    brkDiv.innerHTML = '<p style="color:var(--text3);font-size:0.8rem;">No markets loaded yet.</p>';
  } else {
    const rows = sources.map(src => {
      const e = by[src];
      const sports = Object.entries(e.by_sport || {}).sort((a,b) => b[1]-a[1])
                           .slice(0, 5).map(([k,v]) => `${k}:${v}`).join(' · ');
      const types  = Object.entries(e.by_type  || {}).sort((a,b) => b[1]-a[1])
                           .slice(0, 4).map(([k,v]) => `${k}:${v}`).join(' · ');

      const samplesId = `s-${src}`;
      const samplesHtml = (e.samples || []).map(s =>
        `<div class="sample-item">
           <span class="sample-sport">${s.sport}</span>
           ${_esc(s.event)} <em style="color:var(--text3)">[${s.type}]</em>
         </div>`
      ).join('');

      return `<tr>
        <td>${_esc(src)}</td>
        <td>${e.total}</td>
        <td>${sports || '—'}</td>
        <td>${types  || '—'}</td>
        <td>
          ${samplesHtml
            ? `<span class="samples-toggle" onclick="document.getElementById('${samplesId}').classList.toggle('open')">▸ samples</span>
               <div class="samples-list" id="${samplesId}">${samplesHtml}</div>`
            : '—'}
        </td>
      </tr>`;
    }).join('');

    brkDiv.innerHTML = `
      <h3>Markets in memory — total ${data.total_markets}</h3>
      <table>
        <thead><tr>
          <th>Source</th><th>Total</th><th>Sports</th><th>Types</th><th>Samples</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
}

function _ago(secs) {
  if (secs == null) return '—';
  if (secs < 60)  return `${Math.round(secs)}s ago`;
  if (secs < 3600) return `${Math.round(secs/60)}m ago`;
  return `${(secs/3600).toFixed(1)}h ago`;
}

function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadDebug();
// Auto-refresh every 15s
setInterval(loadDebug, 15000);
</script>
{% endblock %}
