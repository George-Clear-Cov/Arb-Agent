<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Opening Polymarket...</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:60px 20px;background:#1a1a2e;color:#fff">
  <p style="font-size:18px">Opening Polymarket...</p>
  <script>
    var link = new URLSearchParams(location.search).get('link');
    if (link) {
      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openLink) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.openLink(link, {try_instant_view: false});
      } else {
        window.location.href = link;
      }
    }
  </script>
</body>
</html>
